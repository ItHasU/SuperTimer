name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Permet de relancer manuellement une release depuis un tag existant
  # (choisir le tag dans le menu "Use workflow from" avant de lancer).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Builder l'application (PWA mono-fichier)
        run: npm run build

      - name: Empaqueter dist/
        run: |
          cd dist
          zip -r "../supertimer-${GITHUB_REF_NAME}.zip" .

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            supertimer-${{ github.ref_name }}.zip
            dist/index.html
